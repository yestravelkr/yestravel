name: Deploy
# Build cache test trigger
on:
  push:
    branches:
      - main
      - chore/deploy-api-build-cache
    tags:
      - 'v*'
    paths-ignore:
      - 'apps/backoffice/**'
      - 'apps/partner/**'
      - 'apps/shop/**'

env:
  ECR_REPOSITORY: yestravel/yestravel-api
  S3BUCKET: elasticbeanstalk-ap-northeast-2-715590725747
  APP_NAME: yestravel-api

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      TAG_NAME: ${{ steps.vars.outputs.TAG_NAME }}
      STAGE: ${{ steps.vars.outputs.STAGE }}
      ELB_ENV_NAME: ${{ steps.vars.outputs.ELB_ENV_NAME }}

    steps:
      - name: Checkout the current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Use Node.js 22.16.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.x

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: |
            ${{ steps.yarn-cache-dir-path.outputs.dir }}
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Dependencies
        working-directory: apps/api
        run: yarn install --frozen-lockfile

      - name: Build Service
        working-directory: apps/api
        run: yarn build

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set Environment Vars
        id: vars
        run: |
          if [[ "${GITHUB_REF}" =~ ^refs/tags/ ]]; then
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "STAGE=staging" >> $GITHUB_OUTPUT
            echo "ELB_ENV_NAME=yestravel-api-none" >> $GITHUB_OUTPUT
          else
            # 👇 타임스탬프 추가로 버전 중복 방지
            echo "TAG_NAME=$(git rev-parse --short HEAD)-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
            echo "STAGE=develop" >> $GITHUB_OUTPUT
            echo "ELB_ENV_NAME=yestravel-api-development" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          API_ACCESS_KEY_ID: ${{ secrets.API_ACCESS_KEY_ID }}
          API_SECRET_ACCESS_KEY: ${{ secrets.API_SECRET_ACCESS_KEY }}
        run: |
          echo "Building Docker Image with TAG_NAME: ${{ steps.vars.outputs.TAG_NAME }}"
          docker buildx build -f apps/api/Dockerfile --platform linux/amd64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.TAG_NAME }} . \
            --build-arg AWS_ACCESS_KEY_ID=$API_ACCESS_KEY_ID \
            --build-arg AWS_SECRET_ACCESS_KEY=$API_SECRET_ACCESS_KEY

      - name: Upload deployment bundle
        env:
          BUNDLE_FILE: ${{ steps.vars.outputs.TAG_NAME }}-YestravelAPI.zip
        run: |
          # Dockerrun.aws.json에 태그 적용
          sed -e "s/<TAG>/${{ steps.vars.outputs.TAG_NAME }}/" ./apps/api/Dockerrun.aws.json > Dockerrun.aws.json

          # .ebextensions 폴더와 함께 zip 생성
          mkdir -p .ebextensions
          cp -r ./apps/api/.ebextensions/* .ebextensions/ 2>/dev/null || true
          zip -r $BUNDLE_FILE Dockerrun.aws.json .ebextensions/

          aws s3 cp $BUNDLE_FILE s3://$S3BUCKET/$BUNDLE_FILE

      - name: Create Elastic Beanstalk version
        env:
          BUNDLE_FILE: ${{ steps.vars.outputs.TAG_NAME }}-YestravelAPI.zip
        run: |
          aws elasticbeanstalk create-application-version \
            --region ap-northeast-2 \
            --application-name $APP_NAME \
            --version-label ${{ steps.vars.outputs.TAG_NAME }} \
            --source-bundle S3Bucket="$S3BUCKET",S3Key="$BUNDLE_FILE"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ needs.build.outputs.STAGE == 'develop' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy Environment
        run: |
          aws elasticbeanstalk update-environment \
            --region ap-northeast-2 \
            --application-name $APP_NAME \
            --environment-name ${{ needs.build.outputs.ELB_ENV_NAME }} \
            --version-label ${{ needs.build.outputs.TAG_NAME }}
