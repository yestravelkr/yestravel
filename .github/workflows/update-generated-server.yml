name: 'Update Generated Server on Develop'

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - main

jobs:
  update-generated-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: ./apps/api

      - name: Generate server.ts
        run: yarn start:dev &
        working-directory: ./apps/api
        env:
          NODE_ENV: development

      - name: Wait for server generation
        run: sleep 10

      - name: Stop server
        run: pkill -f "yarn start:dev" || true

      - name: Check if server.ts was generated and changed
        run: |
          if [ -f "packages/api-types/src/server.ts" ]; then
            echo "server.ts exists"
            git add packages/api-types/src/server.ts
            if git diff --staged --quiet; then
              echo "No changes in server.ts"
              echo "GENERATED=false" >> $GITHUB_ENV
            else
              echo "server.ts has changes"
              echo "GENERATED=true" >> $GITHUB_ENV
            fi
            git reset HEAD packages/api-types/src/server.ts
          else
            echo "server.ts was not generated"
            echo "GENERATED=false" >> $GITHUB_ENV
          fi

      - name: Commit and push if generated
        if: env.GENERATED == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add packages/api-types/src/server.ts
          git commit -m "Update generated server.ts [skip ci]"
          git push